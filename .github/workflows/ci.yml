name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  lint-and-compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Lint (ruff)
        run: ruff check src app test scripts

      - name: Compile check (semua .py bisa di-import-parse)
        run: python -m compileall -q src app test scripts
