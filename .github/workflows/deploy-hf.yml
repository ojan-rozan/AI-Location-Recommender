name: Deploy to Hugging Face Spaces

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  sync-hf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history + LFS)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push ke HF Space — API
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git push --force \
            "https://rozan14:${HF_TOKEN}@huggingface.co/spaces/rozan14/api-loc-recsys" \
            HEAD:main

      - name: Push ke HF Space — UI
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git push --force \
            "https://rozan14:${HF_TOKEN}@huggingface.co/spaces/rozan14/ui-loc-recsys" \
            HEAD:main
